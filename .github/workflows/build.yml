name: Build J2ME Game JAR

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Download J2ME API Stubs
        run: |
          mkdir -p lib
          curl -sL https://repo1.maven.org/maven2/org/microemu/cldcapi11/2.0.4/cldcapi11-2.0.4.jar -o lib/cldcapi11.jar
          curl -sL https://repo1.maven.org/maven2/org/microemu/midpapi20/2.0.4/midpapi20-2.0.4.jar -o lib/midpapi20.jar

      - name: Compile J2ME Classes
        run: |
          mkdir -p bin
          javac -source 1.6 -target 1.6 -cp "lib/cldcapi11.jar:lib/midpapi20.jar" -d bin $(find src -name "*.java")

      - name: Package J2ME JAR
        run: |
          mkdir -p build_out
          cp -r bin/* build_out/
          cp -r res/* build_out/
          cp -r META-INF build_out/
          
          cd build_out
          jar cvfm ../AppySnake.jar META-INF/MANIFEST.MF .

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AppySnake-Game-JAR
          path: AppySnake.jar
