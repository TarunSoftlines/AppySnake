name: Build J2ME Game JAR

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Download J2ME API & Sound Stubs
        run: |
          mkdir -p lib
          curl -sL https://repo1.maven.org/maven2/org/microemu/cldcapi11/2.0.4/cldcapi11-2.0.4.jar -o lib/cldcapi11.jar
          curl -sL https://repo1.maven.org/maven2/org/microemu/midpapi20/2.0.4/midpapi20-2.0.4.jar -o lib/midpapi20.jar
          curl -sL https://repo1.maven.org/maven2/org/microemu/microemu-jsr-135/2.0.4/microemu-jsr-135-2.0.4.jar -o lib/mmapi.jar

      - name: Compile J2ME Classes
        run: |
          mkdir -p bin
          javac -source 1.6 -target 1.6 -cp "lib/cldcapi11.jar:lib/midpapi20.jar:lib/mmapi.jar" -d bin $(find src -name "*.java")

      - name: Package J2ME JAR
        run: |
          mkdir -p build_out
          
          # Copy compiled classes
          cp -r bin/* build_out/
          
          # Copy resources (png, wav, mp3) from whichever res folder exists
          if [ -d "src/com/appysnake/res" ]; then
            cp -r src/com/appysnake/res/* build_out/
          elif [ -d "res" ]; then
            cp -r res/* build_out/
          fi
          
          # Locate MANIFEST.MF file automatically
          MANIFEST_PATH=$(find . -name "MANIFEST.MF" | head -n 1)
          
          cd build_out
          jar cvfm ../AppySnake.jar "$GITHUB_WORKSPACE/$MANIFEST_PATH" .

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AppySnake-Game-JAR
          path: AppySnake.jar
